<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mahora Coffee | Coming Soon</title>

<meta name="description" content="Mahora Coffee - Specialty coffee roasted with care. Launching soon.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

:root{
    --bg:#f7f4ee;
    --olive:#6b7343;
    --brown:#4a3424;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Georgia, serif;
    background: var(--bg);
    color: var(--brown);
}

.banner{
    width:100%;
    position:relative;
}

.banner img{
    width:100%;
    display:block;
}

.content{
    text-align:center;
    padding:80px 20px 100px;
}

.tagline{
    margin-bottom:10px;
}

.pour-over{
    display:flex;
    justify-content:center;
    margin:10px 0;
}

.dripper{
    position:relative;
    width:70px;
    height:55px;
    margin:0 auto;
    border-left:4px solid #6b7343;
    border-right:4px solid #6b7343;
    border-bottom:4px solid #6b7343;
    clip-path:polygon(0 0,100% 0,78% 100%,22% 100%);
}

.dripper:before,
.dripper:after{
    content:'';
    position:absolute;
    top:10px;
    width:2px;
    height:30px;
    background:#6b7343;
    opacity:.5;
}

.dripper:before{
    left:22px;
    transform:rotate(-15deg);
}

.dripper:after{
    right:22px;
    transform:rotate(15deg);
}
    
.cup{
    width:60px;
    height:35px;
    border:3px solid #6b7343;
    border-radius:0 0 12px 12px;
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
}

.drop{
    width:8px;
    height:8px;
    background:#4a3424;
    border-radius:50%;
    position:absolute;
    left:50%;
    top:35px;
    transform:translateX(-50%);
    animation:drip 1.5s infinite;
}

.coming-soon{
    margin-top:10px;
}

.footer{
    text-align:center;
    padding:30px 20px;
    border-top:1px solid rgba(0,0,0,0.05);
}

.footer p{
    font-size:0.95rem;
}

@keyframes drip{
    0%{
        top:35px;
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        top:85px;
        opacity:0;
    }
}

@media(max-width:768px){

    .tagline{
        font-size:1.4rem;
    }

    .coming-soon{
        font-size:2.5rem;
    }
}

</style>
</head>
<body>

<section class="banner">
    <img src="images/mahora-banner.PNG" alt="Mahora Coffee">
</section>

<section class="content">

    <p class="tagline">
        Something exceptional is brewing.
    </p>

    <div class="pour-over">
        <svg width="110" height="120" viewBox="0 0 110 120" xmlns="http://www.w3.org/2000/svg">

            <!-- V60 Cone -->
            <path d="M30 20 L80 20 L60 65 L50 65 Z"
                  fill="none"
                  stroke="#6b7343"
                  stroke-width="3"/>

            <!-- Spiral ribs -->
            <path d="M38 28 L48 58"
                  stroke="#6b7343"
                  stroke-width="2"
                  opacity="0.6"/>

            <path d="M55 24 L55 60"
                  stroke="#6b7343"
                  stroke-width="2"
                  opacity="0.6"/>

            <path d="M72 28 L62 58"
                  stroke="#6b7343"
                  stroke-width="2"
                  opacity="0.6"/>

            <!-- Coffee drop -->
            <circle cx="55" cy="70" r="4" fill="#4a3424">
                <animate
                    attributeName="cy"
                    values="70;95;70"
                    dur="1.5s"
                    repeatCount="indefinite"/>
                <animate
                    attributeName="opacity"
                    values="0;1;0"
                    dur="1.5s"
                    repeatCount="indefinite"/>
            </circle>

            <!-- Cup -->
            <path d="M35 95
                     L75 95
                     L75 115
                     Q75 120 70 120
                     L40 120
                     Q35 120 35 115 Z"
                  fill="none"
                  stroke="#6b7343"
                  stroke-width="3"/>

        </svg>
    </div>

    <h1 class="coming-soon">
        Coming Soon
    </h1>

</section>

<footer class="footer">
    <p>
        © 2026 Mahora Coffee. All Rights Reserved.
    </p>

</footer>

</body>
</html>
